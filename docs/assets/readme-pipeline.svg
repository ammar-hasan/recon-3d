<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Recon3D reconstruction pipeline</title>
  <desc id="desc">A reference image flows through vector evidence and geometric primitives into an editable three-dimensional object.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081426"/>
      <stop offset="0.5" stop-color="#10143a"/>
      <stop offset="1" stop-color="#211145"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.52" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="object" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67e8f9" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <clipPath id="imageClip"><rect x="70" y="92" width="205" height="154" rx="15"/></clipPath>
    <style>
      .label { fill: #f8fafc; font: 600 17px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: .2px; }
      .small { fill: #a5b4fc; font: 500 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: 1px; }
      .muted { fill: #94a3b8; font: 500 13px ui-sans-serif, system-ui, sans-serif; }
      .panel { fill: #0f1b35; stroke: #334155; stroke-width: 1.4; }
      .flow { fill: none; stroke: url(#accent); stroke-width: 3; stroke-linecap: round; stroke-dasharray: 10 13; animation: stream 1.4s linear infinite; }
      .pulse-a { animation: pulse 4.8s ease-in-out infinite; transform-origin: 172px 169px; }
      .pulse-b { animation: pulse 4.8s 1.2s ease-in-out infinite; transform-origin: 459px 169px; }
      .pulse-c { animation: pulse 4.8s 2.4s ease-in-out infinite; transform-origin: 742px 169px; }
      .pulse-d { animation: pulse 4.8s 3.6s ease-in-out infinite; transform-origin: 1030px 169px; }
      .orbit { animation: rotate 12s linear infinite; transform-origin: 1031px 169px; }
      .scan { animation: scan 3.2s ease-in-out infinite; }
      @keyframes stream { to { stroke-dashoffset: -23; } }
      @keyframes pulse { 0%, 20%, 100% { opacity: .86; transform: scale(1); } 10% { opacity: 1; transform: scale(1.025); } }
      @keyframes rotate { to { transform: rotate(360deg); } }
      @keyframes scan { 0%, 100% { transform: translateX(0); opacity: 0; } 15% { opacity: .8; } 50% { opacity: .8; } 85% { opacity: 0; } 100% { transform: translateX(205px); } }
      @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
    </style>
  </defs>

  <rect width="1200" height="360" rx="24" fill="url(#background)"/>
  <path d="M40 50H1160" stroke="#312e81" stroke-opacity=".55"/>
  <circle cx="54" cy="30" r="5" fill="#2dd4bf"/><circle cx="72" cy="30" r="5" fill="#818cf8"/><circle cx="90" cy="30" r="5" fill="#c084fc"/>
  <text x="110" y="35" class="small">STRUCTURED RECONSTRUCTION / EVIDENCE → EDITABLE GEOMETRY</text>

  <path class="flow" d="M287 169H337"/>
  <path class="flow" d="M568 169H618"/>
  <path class="flow" d="M850 169H900"/>
  <circle cx="312" cy="169" r="4" fill="#5eead4" filter="url(#glow)"/>
  <circle cx="593" cy="169" r="4" fill="#818cf8" filter="url(#glow)"/>
  <circle cx="875" cy="169" r="4" fill="#c084fc" filter="url(#glow)"/>

  <!-- Input image -->
  <g class="pulse-a" filter="url(#shadow)">
    <rect class="panel" x="58" y="78" width="229" height="182" rx="20"/>
    <g clip-path="url(#imageClip)">
      <rect x="70" y="92" width="205" height="154" fill="#172554"/>
      <path d="M70 211L120 166L154 188L211 124L275 184V246H70Z" fill="#1e3a5f"/>
      <ellipse cx="170" cy="174" rx="63" ry="51" fill="#111827" stroke="#5eead4" stroke-width="5"/>
      <ellipse cx="170" cy="174" rx="38" ry="31" fill="#25365f" stroke="#818cf8" stroke-width="4"/>
      <circle cx="170" cy="174" r="10" fill="#c4b5fd"/>
      <g stroke="#a5b4fc" stroke-width="5">
        <path d="M170 143V164"/><path d="M170 184V205"/><path d="M132 174H160"/><path d="M180 174H208"/>
      </g>
      <rect class="scan" x="70" y="92" width="3" height="154" fill="#5eead4" filter="url(#glow)"/>
    </g>
    <text x="172" y="286" text-anchor="middle" class="label">reference image</text>
    <text x="172" y="307" text-anchor="middle" class="muted">visible evidence</text>
  </g>

  <!-- Vector evidence -->
  <g class="pulse-b" filter="url(#shadow)">
    <rect class="panel" x="337" y="78" width="231" height="182" rx="20"/>
    <g transform="translate(367 103)" fill="none">
      <path d="M20 72C20 30 55 6 93 6C137 6 170 34 170 72C170 111 137 137 93 137C52 137 20 111 20 72Z" stroke="#2dd4bf" stroke-width="3"/>
      <ellipse cx="93" cy="72" rx="43" ry="35" stroke="#818cf8" stroke-width="3"/>
      <path d="M93 37V107M50 72H136M63 47L123 98M123 47L63 98" stroke="#c084fc" stroke-width="2" stroke-dasharray="4 6"/>
      <g fill="#f8fafc">
        <circle cx="20" cy="72" r="3"/><circle cx="93" cy="6" r="3"/><circle cx="170" cy="72" r="3"/><circle cx="93" cy="137" r="3"/>
        <circle cx="50" cy="72" r="3"/><circle cx="93" cy="37" r="3"/><circle cx="136" cy="72" r="3"/><circle cx="93" cy="107" r="3"/>
      </g>
    </g>
    <text x="452" y="286" text-anchor="middle" class="label">vector evidence</text>
    <text x="452" y="307" text-anchor="middle" class="muted">traces + topology</text>
  </g>

  <!-- Primitive graph -->
  <g class="pulse-c" filter="url(#shadow)">
    <rect class="panel" x="618" y="78" width="232" height="182" rx="20"/>
    <g transform="translate(652 104)" fill="none">
      <ellipse cx="82" cy="69" rx="70" ry="57" stroke="#2dd4bf" stroke-width="3"/>
      <ellipse cx="82" cy="69" rx="41" ry="33" stroke="#818cf8" stroke-width="3"/>
      <circle cx="82" cy="69" r="10" stroke="#c084fc" stroke-width="3"/>
      <g stroke="#a5b4fc" stroke-width="4">
        <path d="M82 36V59"/><path d="M82 79V102"/><path d="M41 69H72"/><path d="M92 69H123"/>
      </g>
      <g fill="#5eead4">
        <circle cx="82" cy="12" r="3"/><circle cx="152" cy="69" r="3"/><circle cx="82" cy="126" r="3"/><circle cx="12" cy="69" r="3"/>
      </g>
      <path d="M22 116H142" stroke="#475569" stroke-width="1.5" stroke-dasharray="3 5"/>
      <path d="M22 112V120M142 112V120" stroke="#94a3b8" stroke-width="1.5"/>
    </g>
    <text x="734" y="286" text-anchor="middle" class="label">semantic sketch</text>
    <text x="734" y="307" text-anchor="middle" class="muted">parts + constraints</text>
  </g>

  <!-- Editable 3D -->
  <g class="pulse-d" filter="url(#shadow)">
    <rect class="panel" x="900" y="78" width="242" height="182" rx="20"/>
    <g transform="translate(937 102)">
      <ellipse cx="101" cy="70" rx="62" ry="60" fill="url(#object)" stroke="#67e8f9" stroke-width="2.5"/>
      <ellipse cx="83" cy="70" rx="62" ry="60" fill="#11183c" stroke="#818cf8" stroke-width="2.5"/>
      <path d="M83 10L101 10M83 130L101 130M21 70H39M145 70H163" stroke="#67e8f9" stroke-width="2.5"/>
      <ellipse cx="83" cy="70" rx="36" ry="35" fill="#172554" stroke="#c084fc" stroke-width="3"/>
      <g stroke="#a5b4fc" stroke-width="5">
        <path d="M83 35V59"/><path d="M83 81V105"/><path d="M47 70H72"/><path d="M94 70H119"/>
      </g>
      <circle cx="83" cy="70" r="11" fill="#c4b5fd" stroke="#f8fafc" stroke-width="2"/>
      <g class="orbit" fill="none" stroke="#2dd4bf" stroke-width="1.4" stroke-dasharray="3 7" opacity=".8">
        <circle cx="94" cy="70" r="76"/>
        <circle cx="170" cy="70" r="3" fill="#2dd4bf" stroke="none" filter="url(#glow)"/>
      </g>
    </g>
    <text x="1021" y="286" text-anchor="middle" class="label">editable 3D</text>
    <text x="1021" y="307" text-anchor="middle" class="muted">named parts + parameters</text>
  </g>

  <text x="600" y="340" text-anchor="middle" class="small">OBSERVE · STRUCTURE · CONSTRUCT · RENDER · MEASURE · REFINE</text>
</svg>
